<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grammar Guru</title>

    <!-- External CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Header -->
    <header>
        <div>
            <h1>📝 Grammar Guru</h1>
            <p>Check your grammar and learn from your mistakes!</p>
        </div>
    </header>

    <!-- Main Content -->
    <div class="container">

        <!-- Left Side -->
        <div class="left">

            <!-- Text Input -->
            <textarea
                id="inputText"
                placeholder="Type or paste your text here... (max 1000 characters)"
                oninput="updateCharCount()"
            ></textarea>

            <!-- Character Count -->
            <div class="char-count" id="charCount">0 / 1000 characters</div>

            <!-- Check Button -->
            <button id="checkBtn" onclick="checkGrammar()">
                ✅ Check Grammar
            </button>

            <!-- Error Box -->
            <div class="error-box" id="errorBox"></div>

            <!-- Loading -->
            <div class="loading" id="loading">
                🔍 Checking your grammar...
            </div>

            <!-- Results -->
            <div class="results" id="results">
                <h3>✅ Corrected Text:</h3>
                <div class="corrected-text" id="correctedText"></div>

                <h3>❌ Mistakes Found:</h3>
                <div id="mistakesList"></div>
            </div>

        </div>

        <!-- Right Side -->
        <div class="right">

            <!-- Score Card -->
            <div class="score-card" id="scoreCard">
                <h3>YOUR SCORE</h3>
                <div class="score-number" id="scoreNumber">-</div>
                <div class="score-label">out of 100</div>
            </div>

            <!-- Mistake Count -->
            <div class="mistake-count" id="mistakeCount">
                <h3>MISTAKES FOUND</h3>
                <span id="mistakeNumber">0</span>
            </div>

            <!-- Summary Card -->
            <div class="summary-card" id="summaryCard">
                <h3>FEEDBACK</h3>
                <p id="summaryText"></p>
            </div>

        </div>
    </div>

    <!-- External JS -->
    <script src="js/app.js"></script>

</body>
</html>
